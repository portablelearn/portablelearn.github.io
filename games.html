<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portable Learning — Games</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo">PL</div>
      <div>
        <div class="title">Portable Learning</div>
        <div class="subtitle">Games — focused viewing</div>
      </div>
    </div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="admin.html" class="admin-link">Teacher Panel</a>
    </nav>
  </header>

  <main class="container">
    <section class="game-view">
      <div class="view-top">
        <div id="gameTitle" class="game-title">Select a game from the library</div>
        <div class="view-controls">
          <button id="openLibrary">Open Library</button>
          <button id="fullscreenBtn">Fullscreen</button>
          <label>Scale <input id="scaleRange" type="range" min="0.5" max="1.5" step="0.05" value="1" /></label>
        </div>
      </div>

      <div class="view-body">
        <div id="libraryPanel" class="library-panel"></div>
        <div class="iframe-wrap">
          <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div>© 2025 Portable Learning</div>
    <div class="footer-right">Use Teacher Panel for site customization</div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
